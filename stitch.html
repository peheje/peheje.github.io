<!doctype html>

<html lang="en">

<head>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/hamster.png" type="image/png">
</head>

<body>
    <div id="menu"></div>
    <main class="app-shell">
        <section class="ab">
            <div class="inline-block heic-drop-zone" id="stitch-drop-zone">
                <label for="stitch-files">Select images to stitch (minimum 2):</label>
                <input id="stitch-files" type="file" accept=".heic,.heif,.jpg,.jpeg,.png,.webp,image/heic,image/heif,image/jpeg,image/png,image/webp" multiple>
                <p class="result-line">Processing runs entirely local in this browser.</p>
            </div>
            
            <div class="inline-block">
                <label>Stitch Direction:</label>
                <label class="choice-row">
                    <input type="radio" name="stitch-direction" value="vertical" checked>
                    Vertical
                </label>
                <label class="choice-row">
                    <input type="radio" name="stitch-direction" value="horizontal">
                    Horizontal
                </label>
            </div>

            <div class="inline-block">
                <label>Camera Movement / Shooting Order:</label>
                <label class="choice-row">
                    <input type="radio" name="stitch-order" value="newest" checked>
                    <span id="order-label-1">From Bottom to Top</span>
                </label>
                <label class="choice-row">
                    <input type="radio" name="stitch-order" value="oldest">
                    <span id="order-label-2">From Top to Bottom</span>
                </label>
            </div>

            <div class="inline-block">
                <label>Exposure Correction:</label>
                <label class="choice-row">
                    <input type="checkbox" id="stitch-auto-exposure" checked>
                    Auto Match Overlaps
                </label>
            </div>


        </section>

        <div class="actions">
            <button id="stitch-btn" type="button" disabled>Stitch Images</button>
            <button id="clear-btn" type="button" class="red" disabled>Clear</button>
        </div>

        <p id="stitch-status" class="result-line">Choose two or more images to begin.</p>

        <section class="inline-block">
            <label>Selected Files</label>
            <div id="file-list" class="heic-metadata-list">
                <p class="result-line">No files selected.</p>
            </div>
        </section>

        <section class="inline-block" id="preview-section" style="display: none; width: 100%;">
            <label>Stitched Result</label>
            <div id="stitch-results" class="heic-results">
                <div class="heic-result-card" style="padding: 16px;">
                    <div id="canvas-container" style="max-height: 600px; overflow: auto; border: 1px solid var(--border-color, #ccc); border-radius: var(--border-radius, 4px); margin-bottom: 12px; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center;">
                        <canvas id="preview-canvas" style="display: block; max-width: 100%; height: auto;"></canvas>
                    </div>
                    <div class="heic-result-info" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                        <span id="preview-dimensions" class="notice">Dimensions: 0 x 0</span>
                        <a id="download-btn" class="button-link" href="#" download="panorama_vertical.jpg" style="text-decoration: none;">Download Panorama</a>
                    </div>
                </div>
            </div>
        </section>

        <details id="debug-section" style="display: none; width: 100%; margin-top: 24px;">
            <summary style="cursor: pointer; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: var(--text-color, #333);">Debug Console Logs</summary>
            <textarea id="debug-log" readonly style="width: 100%; height: 160px; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.02); color: var(--text-color, #333); border: 1px solid var(--border-color, #ccc); border-radius: var(--border-radius, 4px); padding: 8px; box-sizing: border-box; resize: vertical;" placeholder="Debug logs will appear here during stitching..."></textarea>
            <button id="copy-log-btn" type="button" class="notice" style="margin-top: 8px; padding: 6px 12px;">Copy Logs</button>
        </details>
    </main>

    <script type="module" src="js/pages/stitch.js"></script>
</body>

</html>
