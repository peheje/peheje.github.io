<!doctype html>

<html lang="en">

<head>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/hamster.png" type="image/png">
</head>

<body>
    <div id="menu"></div>
    <main class="app-shell">
        <section class="ab">
            <div class="inline-block heic-drop-zone" id="heic-drop-zone">
                <label for="heic-files">HEIC or HEIF images:</label>
                <input id="heic-files" type="file" accept=".heic,.heif,image/heic,image/heif" multiple>
                <p class="result-line">Images stay local. Conversion runs in this browser and does not upload files.</p>
            </div>

            <div class="inline-block">
                <label for="jpeg-quality">JPEG quality: <span id="jpeg-quality-value">90%</span></label>
                <input id="jpeg-quality" type="range" min="50" max="100" step="1" value="90">
                <p class="result-line">Higher quality keeps more detail and creates larger JPEG files.</p>
            </div>
        </section>

        <div class="actions">
            <button id="convert-btn" type="button" disabled>Convert</button>
            <button id="clear-btn" type="button" class="red" disabled>Clear</button>
        </div>

        <p id="heic-status" class="result-line">Choose one or more HEIC files to begin.</p>

        <section class="inline-block">
            <label>Converted JPEGs</label>
            <div id="heic-results" class="heic-results"></div>
        </section>
    </main>

    <script type="module" src="js/pages/heic.js"></script>
</body>

</html>
