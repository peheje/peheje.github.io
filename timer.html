<!doctype html>

<html lang="en">

<head>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="style.css?v=2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/hamster.png" type="image/png">
</head>

<body>
    <div id="menu"></div>
    <main class="app-shell">
        <section class="kid-timer-panel">
            <p id="timer-state-pill" class="notice"></p>
            <div class="kid-timer-visual-wrap">
                <div id="timer-visual" class="kid-timer-visual">
                    <svg class="kid-timer-svg" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
                        <circle class="kid-timer-face" cx="50" cy="50" r="46"></circle>
                        <path id="timer-progress-shape" class="kid-timer-progress-shape"></path>
                        <g id="timer-ticks" class="kid-timer-ticks"></g>
                    </svg>
                    <div class="kid-timer-gloss"></div>
                    <div class="kid-timer-center">
                        <p id="timer-visual-label" class="kid-timer-visual-label">Time left</p>
                        <p id="timer-countdown" class="kid-timer-countdown">10:00</p>
                    </div>
                </div>
            </div>
            <p id="timer-status" class="result-line"></p>
            <p id="timer-helper" class="result-line"></p>
        </section>

        <section class="actions kid-timer-presets" aria-label="Quick timer presets">
            <button id="timer-preset-5" type="button">5 min</button>
            <button id="timer-preset-10" type="button">10 min</button>
            <button id="timer-preset-15" type="button">15 min</button>
            <button id="timer-preset-30" type="button">30 min</button>
        </section>

        <section class="ab">
            <div class="inline-block">
                <label for="timer-custom-minutes">Choose minutes:</label>
                <input id="timer-custom-minutes" type="number" min="1" max="180" step="1" value="10" data-stepper="true">
                <div class="actions kid-timer-inline-actions">
                    <button id="timer-start-custom" type="button">Start</button>
                    <button id="timer-pause-resume" type="button" class="display-none">Pause</button>
                    <button id="timer-reset" type="button" class="red display-none">Reset</button>
                </div>
            </div>

            <div class="inline-block">
                <label>Sound Settings</label>
                <div class="timer-sound-row">
                    <label for="timer-sound-select">Alarm Tone:</label>
                    <select id="timer-sound-select">
                        <option value="escalating">Escalating Alert</option>
                        <option value="chime">Gentle Chime</option>
                        <option value="beeps">Playful Beeps</option>
                    </select>
                </div>
                <div class="timer-sound-row checkbox-row">
                    <input id="timer-mute-checkbox" type="checkbox">
                    <label for="timer-mute-checkbox">Mute Alarm Sound</label>
                </div>
                <div class="actions timer-sound-actions">
                    <button id="timer-test-sound" type="button" class="btn-small">Test Tone</button>
                </div>
            </div>

            <div class="inline-block">
                <label>How it works</label>
                <p class="result-line">The timer runs locally in this browser tab and keeps going if you reload the page.</p>
                <p class="result-line">It plays an alarm when time is up and then stays on the done screen until you start again or reset. Choose your alarm tone in Sound Settings.</p>
                <p class="result-line">While the timer is running your screen stays awake.</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/pages/timer.js"></script>
</body>

</html>
