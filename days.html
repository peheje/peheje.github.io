<!doctype html>

<html lang="en">

<head>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/hamster.png" type="image/png">
</head>

<body>
    <div id="menu"></div>
    <main class="app-shell">
        <section class="ab">
            <div class="inline-block">
                <label for="start-day">Start day:</label>
                <input id="start-day" type="date" />
                <div id="start-time-field" hidden>
                    <label for="start-time">Start time:</label>
                    <input id="start-time" type="time" step="60" />
                </div>
            </div>
            <div class="inline-block">
                <label for="end-day">End day:</label>
                <input id="end-day" type="date" />
                <div id="end-time-field" hidden>
                    <label for="end-time">End time:</label>
                    <input id="end-time" type="time" step="60" />
                </div>
            </div>
            <div class="inline-block">
                <label for="include-times">Include times:</label>
                <input id="include-times" type="checkbox" />
            </div>
        </section>

        <p class="red" id="error"></p>

        <section class="ab">
            <div class="inline-block">
                <label>Total duration</label>
                <b id="total-duration">-</b>
                <br>
                <label>Weekend-days:</label>
                <b id="weekend-days">-</b>
                <br>
                <label>Months:</label>
                <b id="months">-</b>
                <br>
                <label>Years:</label>
                <b id="years">-</b>
            </div>

            <div class="inline-block">
                <label>Add days to end:</label>
                <div class="margin-bottom-10">
                    <input id="add-days-input" type="number" value="1" data-stepper="true" />
                </div>
                <button id="add-days-btn">Add</button>
            </div>
        </section>
    </main>

    <script type="module" src="js/pages/days.js"></script>
</body>

</html>
